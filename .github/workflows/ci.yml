name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check

      - name: Type check (mypy, warn only)
        run: uv run mypy adc_linker_agent || true

      - name: Test
        run: |
          uv run pytest tests/ -x --tb=short \
            -k "not test_expanded_query_returns_results and not test_unexpanded_query" \
            --cov=adc_linker_agent --cov-report=term-missing
