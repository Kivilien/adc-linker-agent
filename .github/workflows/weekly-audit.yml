name: Weekly Audit

on:
  schedule:
    - cron: "7 1 * * 1"  # Monday 9:07 AM CST (1:07 UTC)
  workflow_dispatch:       # allow manual trigger

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Full test suite
        run: |
          uv run pytest tests/ -x --tb=short \
            --cov=adc_linker_agent --cov-report=term \
            || echo "TESTS_COMPLETED_WITH_STATUS=$?" >> $GITHUB_ENV

      - name: Audit report
        run: |
          echo "## Weekly Audit Report — $(date +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Ruff | $(uv run ruff check 2>&1 | tail -1) |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | $(uv run pytest tests/ --collect-only -q 2>&1 | tail -1) |" >> $GITHUB_STEP_SUMMARY
