<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADC Linker Design Report — {{ report_title }}</title>
<style>
/* ═══════════════════════════════════════════════════════════
   Nord Theme — HTML Slides for ADC Linker Design Report
   Inspired by lewislulu/html-ppt-skill & guizang-ppt-skill
   ═══════════════════════════════════════════════════════════ */

:root {
  --nord0: #2E3440;
  --nord1: #3B4252;
  --nord2: #434C5E;
  --nord3: #4C566A;
  --nord4: #D8DEE9;
  --nord5: #E5E9F0;
  --nord6: #ECEFF4;
  --nord7: #8FBCBB;
  --nord8: #88C0D0;
  --nord9: #81A1C1;
  --nord10: #5E81AC;
  --nord11: #BF616A;
  --nord12: #D08770;
  --nord13: #EBCB8B;
  --nord14: #A3BE8C;
  --nord15: #B48EAD;

  --bg: var(--nord0);
  --text: var(--nord6);
  --accent: var(--nord8);
  --success: var(--nord14);
  --warning: var(--nord13);
  --danger: var(--nord11);
  --muted: var(--nord3);
  --card-bg: var(--nord1);
  --border: var(--nord2);
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}

/* ─── Slide Container ─── */
.slides-container {
  display: flex;
  transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  height: 100vh;
}
.slide {
  min-width: 100vw;
  height: 100vh;
  padding: 60px 80px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  position: relative;
  overflow-y: auto;
}

/* ─── Typography ─── */
h1 { font-size: 3em; font-weight: 800; color: var(--accent); margin-bottom: 10px; }
h2 { font-size: 2em; font-weight: 700; color: var(--accent); margin-bottom: 20px; }
h3 { font-size: 1.3em; font-weight: 600; color: var(--nord9); margin-bottom: 12px; }
.subtitle { font-size: 1.2em; color: var(--muted); margin-bottom: 30px; }
.meta { font-size: 0.9em; color: var(--muted); }
.smiles-mono { font-family: var(--mono); font-size: 0.75em; color: var(--nord9); word-break: break-all; }

/* ─── Cards & Grids ─── */
.card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px;
        padding: 24px; margin-bottom: 16px; }
.metric-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin: 20px 0; }
.metric-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px;
               padding: 20px; text-align: center; }
.metric-value { font-size: 2em; font-weight: 800; color: var(--accent); }
.metric-label { font-size: 0.8em; color: var(--muted); margin-top: 4px;
                text-transform: uppercase; letter-spacing: 1px; }
.metric-value.danger { color: var(--danger); }
.metric-value.success { color: var(--success); }

/* ─── Tables ─── */
table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.85em; }
th { background: var(--nord2); color: var(--accent); padding: 12px 10px; text-align: left;
     font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; font-size: 0.8em; }
td { padding: 10px; border-bottom: 1px solid var(--border); }
tr:nth-child(even) td { background: rgba(59, 66, 82, 0.3); }

/* ─── Score Bars ─── */
.score-row { display: flex; gap: 12px; flex-wrap: wrap; margin: 12px 0; }
.score-item { flex: 1; min-width: 120px; }
.score-label { font-size: 0.75em; color: var(--muted); margin-bottom: 4px;
               text-transform: uppercase; letter-spacing: 0.5px; }
.score-bar-bg { height: 8px; background: var(--nord2); border-radius: 4px; overflow: hidden; }
.score-bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
.score-value { font-size: 0.85em; color: var(--text); margin-top: 2px; }

/* ─── Molecule Image ─── */
.mol-img { max-width: 100%; border-radius: 8px; background: var(--nord0); padding: 8px; }

/* ─── Two-column layout ─── */
.cols-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }

/* ─── Tags ─── */
.tag { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.75em;
       font-weight: 600; margin-right: 6px; }
.tag-ok { background: rgba(163, 190, 140, 0.2); color: var(--success); }
.tag-warn { background: rgba(235, 203, 139, 0.2); color: var(--warning); }
.tag-danger { background: rgba(191, 97, 106, 0.2); color: var(--danger); }
.tag-info { background: rgba(136, 192, 208, 0.2); color: var(--accent); }

/* ─── Navigation ─── */
.nav { position: fixed; bottom: 24px; right: 24px; display: flex; gap: 8px; z-index: 100; }
.nav button { background: var(--card-bg); border: 1px solid var(--border); color: var(--text);
              width: 40px; height: 40px; border-radius: 8px; cursor: pointer; font-size: 1.1em;
              transition: background 0.2s; }
.nav button:hover { background: var(--nord2); }
.nav button.active { background: var(--nord10); border-color: var(--accent); }
.slide-counter { color: var(--muted); font-size: 0.75em; display: flex; align-items: center;
                  padding: 0 8px; }
.progress-dots { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
                 display: flex; gap: 6px; z-index: 100; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--nord3);
       cursor: pointer; transition: background 0.2s; }
.dot.active { background: var(--accent); }

/* ─── Footer ─── */
.footer { position: absolute; bottom: 20px; left: 80px; right: 80px;
          font-size: 0.7em; color: var(--muted); display: flex; justify-content: space-between; }

/* ─── Strengths/Weaknesses ─── */
.sw-list { list-style: none; }
.sw-list li { padding: 4px 0; font-size: 0.9em; }
.sw-list li::before { content: '• '; color: var(--accent); }

/* ─── Print / Responsive ─── */
@media (max-width: 768px) {
  .slide { padding: 30px 20px; }
  .metric-grid { grid-template-columns: repeat(2, 1fr); }
  .cols-2 { grid-template-columns: 1fr; }
  h1 { font-size: 2em; }
}
</style>
</head>
<body>

<div class="slides-container" id="slidesContainer">
  {% for slide in slides %}
  <div class="slide" id="slide-{{ loop.index0 }}">
    {{ slide }}
  </div>
  {% endfor %}
</div>

<!-- Navigation -->
<div class="progress-dots" id="dots"></div>
<div class="nav">
  <button onclick="goTo(0)" title="First">⏮</button>
  <button onclick="prevSlide()" title="Previous">◀</button>
  <span class="slide-counter" id="counter">1 / {{ slides|length }}</span>
  <button onclick="nextSlide()" title="Next">▶</button>
  <button onclick="goTo({{ slides|length - 1 }})" title="Last">⏭</button>
</div>

<script>
const totalSlides = {{ slides|length }};
let currentSlide = 0;
const container = document.getElementById('slidesContainer');
const dotsContainer = document.getElementById('dots');
const counter = document.getElementById('counter');

// Create dots
for (let i = 0; i < totalSlides; i++) {
  const dot = document.createElement('span');
  dot.className = 'dot' + (i === 0 ? ' active' : '');
  dot.onclick = () => goTo(i);
  dotsContainer.appendChild(dot);
}

function goTo(idx) {
  currentSlide = Math.max(0, Math.min(idx, totalSlides - 1));
  container.style.transform = `translateX(-${currentSlide * 100}vw)`;
  document.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i === currentSlide);
  });
  counter.textContent = `${currentSlide + 1} / ${totalSlides}`;
}

function nextSlide() { goTo(currentSlide + 1); }
function prevSlide() { goTo(currentSlide - 1); }

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextSlide();
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevSlide();
  else if (e.key === 'Home') goTo(0);
  else if (e.key === 'End') goTo(totalSlides - 1);
});

// Touch swipe
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  const diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 50) {
    if (diff > 0) nextSlide();
    else prevSlide();
  }
});

container.style.transform = 'translateX(0)';
</script>
</body>
</html>
